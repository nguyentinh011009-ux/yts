        function switchBcTab(tabId, btn) {
            document.querySelectorAll('.bc-pane').forEach(el => el.classList.remove('active'));

// --- HÀM LOẠI BỎ DẤU TIẾNG VIỆT (DÙNG ĐỂ TÌM KIẾM) ---
        function removeVietnameseTones(str) {
            if (!str) return "";
            str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
            str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            str = str.replace(/đ/g, "d");
            str = str.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
            str = str.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
            str = str.replace(/Ì|Í|Ị|Ỉ|Ĩ/g, "I");
            str = str.replace(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
            str = str.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
            str = str.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
            str = str.replace(/Đ/g, "D");
            return str.toLowerCase();
        }

        // --- LOAD HỌC SINH VÀO COMBOBOX KHI GÕ LỚP ---
        async function fetchStudentsForDD() {
            // Lấy đúng lớp (xóa khoảng trắng và viết in hoa để đồng bộ)
            const cls = document.getElementById('dd-class').value.trim().toUpperCase();
            const sel = document.getElementById('dd-student');
            if(!cls) return;

            sel.innerHTML = '<option>Đang tải dữ liệu...</option>';
            try {
                const snap = await db.collection('yt_students').where('class', '==', cls).get();
                currentStudentsInClass = [];
                sel.innerHTML = '<option value="">-- Chọn Học Sinh --</option>';
                
                if (snap.empty) {
                    sel.innerHTML = '<option value="">(Lớp không có học sinh)</option>';
                    return;
                }

                snap.forEach(doc => {
                    const d = doc.data();
                    currentStudentsInClass.push({id: doc.id, ...d});
                });

                // Sắp xếp Alphabet theo tên tiếng Việt
                currentStudentsInClass.sort((a,b) => (a.name || "").localeCompare(b.name || "", 'vi'));
                
                currentStudentsInClass.forEach(hs => {
                    sel.innerHTML += `<option value="${hs.id}">${hs.name}</option>`;
                });
            } catch (err) {
                console.error("Lỗi khi load học sinh:", err);
                sel.innerHTML = '<option value="">(Lỗi tải dữ liệu)</option>';
            }
        }
// --- TÍNH NĂNG TÌM KIẾM NHANH ---
        let allStudentsCache = []; // Biến lưu toàn bộ học sinh

        // Hàm này gọi 1 lần khi load trang để lấy dữ liệu về tìm cho lẹ
        async function loadAllStudentsCache() {
            try {
                const snap = await db.collection('yt_students').get();
                allStudentsCache = [];
                snap.forEach(doc => {
                    allStudentsCache.push({ id: doc.id, ...doc.data() });
                });
            } catch (error) {
                console.error("Lỗi tải dữ liệu tìm kiếm:", error);
            }
        }

// Xử lý khi admin gõ phím
        function handleQuickSearch(query) {
            const resDiv = document.getElementById('quick-search-results');
            if(!query || query.trim().length < 2) {
                resDiv.style.display = 'none'; // Gõ ít hơn 2 ký tự thì ẩn
                return;
            }

            const q = removeVietnameseTones(query.trim());
            
            // Lọc học sinh theo Tên, Lớp, Số điện thoại, Mã HS hoặc Mã YT
            const matched = allStudentsCache.filter(s => {
                const name = removeVietnameseTones(s.name || "");
                const cls = removeVietnameseTones(s.class || "");
                const phone = s.phone || "";
                const pPhone = s.parentPhone || "";
                
                // Thêm 2 biến quét Mã HS và Mã YT
                const maHS = removeVietnameseTones(s.studentCode || ""); 
                const maYT = removeVietnameseTones(s.id || "");

                // Trả về true nếu từ khóa gõ vào khớp với BẤT KỲ thông tin nào ở trên
                return name.includes(q) || cls.includes(q) || phone.includes(q) || pPhone.includes(q) || maHS.includes(q) || maYT.includes(q);
            }).slice(0, 15); // Chỉ hiển thị tối đa 15 người để tránh lag giao diện

            // Hiển thị kết quả
            if(matched.length === 0) {
                resDiv.innerHTML = '<div style="padding:15px; color:#ef4444; text-align:center;">Không tìm thấy học sinh nào phù hợp!</div>';
            } else {
                let html = '';
                matched.forEach(s => {
                    html += `
                        <div onclick="selectQuickSearch('${s.id}', '${s.class}')" style="padding:12px 15px; border-bottom:1px solid #f1f5f9; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition: 0.2s;" onmouseover="this.style.background='#f0f9ff'" onmouseout="this.style.background='white'">
                            <div>
                                <strong style="color:#0f172a; font-size:15px;">${s.name}</strong> - Lớp: <span style="color:#ef4444; font-weight:bold;">${s.class}</span><br>
                                <small style="color:#64748b; line-height:1.6;">
                                    Mã HS: <span style="color:#2563eb; font-weight:600;">${s.studentCode || 'Chưa có'}</span> | Mã YT: ${s.id} <br>
                                    SĐT: ${s.phone || s.parentPhone || 'Trống'} | Giới tính: ${s.gender || 'Trống'}
                                </small>
                            </div>
                            <button style="background:#2563eb; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:12px;">Chọn <i class="fas fa-check"></i></button>
                        </div>
                    `;
                });
                resDiv.innerHTML = html;
            }
            resDiv.style.display = 'block';
        }
        // Khi click chọn học sinh
        async function selectQuickSearch(studentId, studentClass) {
            // 1. Ẩn bảng tìm kiếm, xóa chữ ở ô tìm kiếm
            document.getElementById('quick-search-results').style.display = 'none';

            // 2. Tự động điền Lớp vào ô Lớp
            document.getElementById('dd-class').value = studentClass;

            // 3. Gọi hàm load danh sách học sinh của lớp đó
            await fetchStudentsForDD();

            // 4. Tự động chọn đúng tên học sinh đó trong Combobox
            document.getElementById('dd-student').value = studentId;

            // Hiệu ứng chớp xanh lá mạ để báo hiệu đã điền thành công
            const sel = document.getElementById('dd-student');
            sel.style.boxShadow = "0 0 10px #22c55e";
            sel.style.border = "2px solid #22c55e";
            setTimeout(() => {
                sel.style.boxShadow = "none";
                sel.style.border = "1px solid #ccc";
            }, 1500);
        }

        // Click ra ngoài thì ẩn cái bảng kết quả đi
        document.addEventListener('click', function(e) {
            if(!e.target.closest('#quick-search-input') && !e.target.closest('#quick-search-results')) {
                document.getElementById('quick-search-results').style.display = 'none';
            }
        });

// --- 3. LƯU ĐIỂM DANH ---
async function saveAttendance() {
    const btn = document.querySelector('button[onclick="saveAttendance()"]');
    const originalText = btn.innerHTML;
    
    try {
        const date = document.getElementById('dd-date').value;
        const studentSelect = document.getElementById('dd-student');
        const sid = studentSelect.value;
        const sname = studentSelect.options[studentSelect.selectedIndex].text;
        
        const cls = document.getElementById('dd-class').value.trim().toUpperCase();
        const reason = document.querySelector('input[name="dd-reason"]:checked')?.value;
        
        if(!date || !sid || !reason) return alert("Vui lòng nhập đủ Ngày, Học sinh và Lý do nghỉ!");

        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lưu...';
        btn.disabled = true;

        const data = {
            studentId: sid, 
            name: sname, 
            class: cls,
            date: date,
            reason: reason,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            notificationId: null // THÊM TRƯỜNG MỚI ĐỂ LƯU ID THÔNG BÁO
        };

        if(reason === 'B') {
            const sym = document.getElementById('dd-symptom').value.trim();
            const diag = document.getElementById('dd-diagnosis').value.trim();
            if(!sym || !diag) throw new Error("Nghỉ bệnh phải nhập Triệu chứng và Chẩn đoán!");
            data.symptom = sym; 
            data.diagnosis = diag;
        }

        // BƯỚC 1: GỬI THÔNG BÁO TRƯỚC
        try {
            let notiContent = `Hệ thống ghi nhận bạn đã vắng mặt ngày ${new Date(date).toLocaleDateString('vi-VN')}.`;
            if (reason === 'P') notiContent += "\nLý do: Có phép.";
            if (reason === 'KP') notiContent += "\nLý do: Không phép.";
            if (reason === 'B') notiContent += `\nLý do: Nghỉ bệnh (${data.diagnosis}).`;

            const notiDoc = await db.collection('yt_notifications').add({
                title: "Thông báo Điểm danh Vắng mặt",
                content: notiContent,
                targetType: "student",
                targetValue: sid,
                sender: "Giám thị / Phòng Y Tế",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            // Lấy ID của thông báo vừa tạo và gán vào dữ liệu điểm danh
            data.notificationId = notiDoc.id;

        } catch(e) { console.error("Lỗi gửi thông báo điểm danh:", e); }
        
        // BƯỚC 2: LƯU ĐIỂM DANH (ĐÃ KÈM THEO ID THÔNG BÁO)
        await db.collection('yt_attendance').add(data);
        
        alert("✅ Lưu điểm danh thành công!");

async function fetchBaseData() {
            try {
                const m = document.getElementById('ex-month').value;
                const y = document.getElementById('ex-year').value;
                const cStr = document.getElementById('ex-class').value.trim().toLowerCase();
                
                if(!m || !y) throw new Error("Vui lòng nhập Tháng và Năm!");

                let targetClasses = cStr ? cStr.split(',').map(x=>x.trim()) : [];
                const prefix = `${y}-${m.padStart(2, '0')}`; // VD: 2024-09

                // Lấy HS
                const stSnap = await db.collection('yt_students').get();
                let students = [];
                stSnap.forEach(d => {
                    const s = d.data();
                    if(targetClasses.length === 0 || targetClasses.includes(s.class.toLowerCase())) students.push({id: d.id, ...s});
                });

                // Lấy Điểm danh
                const attSnap = await db.collection('yt_attendance').where('date', '>=', `${prefix}-01`).where('date', '<=', `${prefix}-31`).get();
                let attendance = [];
                attSnap.forEach(d => attendance.push(d.data()));

                // Lấy Khám bệnh tại trường
                const startDate = new Date(y, m-1, 1);
                const endDate = new Date(y, m, 0, 23, 59, 59);
                const visitSnap = await db.collection('yt_visits').where('timestamp', '>=', startDate).where('timestamp', '<=', endDate).get();
                let visits = [];
                visitSnap.forEach(d => visits.push(d.data()));

                return { m, y, prefix, students, attendance, visits };
            } catch (err) {
                alert("❌ Lỗi tải dữ liệu: " + err.message);
                return null;
            }
        }

// =====================================================================
        // HÀM HỖ TRỢ: GOM NHÓM ĐỢT BỆNH (Dùng chung cho Mẫu 2 và Mẫu 3)
        // =====================================================================
        function groupSickEpisodes(attendanceData) {
            // 1. Chỉ lấy các bản ghi nghỉ vì Bệnh (B)
            const sickAtt = attendanceData.filter(a => a.reason === 'B');
            
            // 2. Phân loại theo từng học sinh
            let studentGroups = {};
            sickAtt.forEach(a => {
                if (!studentGroups[a.studentId]) studentGroups[a.studentId] = [];
                studentGroups[a.studentId].push(a);
            });

            let episodes = [];

            // 3. Xử lý logic gộp đợt bệnh cho từng học sinh
            Object.keys(studentGroups).forEach(sid => {
                // Sắp xếp các ngày nghỉ của HS này theo thứ tự thời gian
                let records = studentGroups[sid].sort((a, b) => new Date(a.date) - new Date(b.date));
                if (records.length === 0) return;

                // Khởi tạo đợt bệnh đầu tiên
                let currentEp = {
                    studentId: sid,
                    startDate: records[0].date,
                    endDate: records[0].date,
                    diagnosis: records[0].diagnosis || 'Khác',
                    symptom: records[0].symptom || '',
                    daysCount: 1
                };

                for (let i = 1; i < records.length; i++) {
                    let rec = records[i];
                    let d1 = new Date(currentEp.endDate);
                    let d2 = new Date(rec.date);
                    let diffDays = (d2 - d1) / (1000 * 60 * 60 * 24); // Khoảng cách số ngày

                    // Kiểm tra xem có phải ngày liên tiếp không (Tính cả qua mốc cuối tuần)
                    let isConsecutive = 
                        diffDays === 1 || // Hôm sau
                        (d1.getDay() === 5 && diffDays === 3) || // Thứ 6 nối sang Thứ 2 (cách 3 ngày)
                        (d1.getDay() === 6 && diffDays === 2);   // Thứ 7 nối sang Thứ 2 (cách 2 ngày)

                    // Nếu liên tiếp VÀ trùng tên bệnh -> Gộp chung
                    if (isConsecutive && (rec.diagnosis === currentEp.diagnosis || currentEp.symptom.includes(rec.symptom))) {
                        currentEp.endDate = rec.date;
                        currentEp.daysCount++;
                        // Gộp thêm triệu chứng nếu khai báo khác nhau
                        if (rec.symptom && !currentEp.symptom.includes(rec.symptom)) {
                             currentEp.symptom += "; " + rec.symptom;
                        }
                    } else {
                        // Nếu cách quãng hoặc khác bệnh -> Đóng đợt cũ, tạo đợt mới
                        episodes.push({...currentEp});
                        currentEp = {
                            studentId: sid,
                            startDate: rec.date,
                            endDate: rec.date,
                            diagnosis: rec.diagnosis || 'Khác',
                            symptom: rec.symptom || '',
                            daysCount: 1
                        };
                    }
                }
                episodes.push(currentEp); // Push đợt cuối cùng
            });

            return episodes; // Trả về danh sách các "đợt bệnh"
        }

    dateInput.value = `${yyyy}-${mm}-${dd}`;

        records.forEach((d, index) => {
            let reasonHtml = '';
            if(d.reason === 'P') reasonHtml = '<span style="background:#eff6ff; color:#2563eb; padding:3px 8px; border-radius:5px; font-weight:bold;">Có phép</span>';
            else if(d.reason === 'KP') reasonHtml = '<span style="background:#fef2f2; color:#ef4444; padding:3px 8px; border-radius:5px; font-weight:bold;">Không phép</span>';
            else if(d.reason === 'B') reasonHtml = `<span style="background:#fffbeb; color:#d97706; padding:3px 8px; border-radius:5px; font-weight:bold;">Bệnh</span><div style="font-size:0.8rem; color:#64748b; margin-top:5px;">${d.diagnosis} (${d.symptom})</div>`;

            html += `
            <tr style="border-bottom: 1px solid #f1f5f9; transition:0.2s;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='white'">
                <td style="padding: 12px; border-right: 1px dashed #e2e8f0;">${index + 1}</td>
                <td style="padding: 12px; font-weight: 500; text-align: left; border-right: 1px dashed #e2e8f0;">${d.name}</td>
                <td style="padding: 12px; border-right: 1px dashed #e2e8f0; font-weight:bold; color:#64748b;">${d.class}</td>
                <td style="padding: 12px; border-right: 1px dashed #e2e8f0;">${reasonHtml}</td>
                <td style="padding: 12px;">
                    <button type="button" onclick="deleteAttendance('${d.id}', '${d.name}', '${d.notificationId}')" class="btn" style="background: none; color: #ef4444; border: 1px solid #fca5a5; padding: 4px 10px; font-size: 0.8rem; margin:0 auto;"><i class="fas fa-trash-alt"></i> Hủy</button>
                </td>
            </tr>`;
        });
        
        tbody.innerHTML = html;
        title.innerHTML = `<i class="fas fa-clipboard-list"></i> Nghỉ học ngày ${displayDate} <span style="color:#ef4444;">(${records.length} HS)</span>`;

    } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" style="padding: 20px; color: red;">Lỗi tải dữ liệu: ${err.message}</td></tr>`;
    }
}

// 3. Hàm Xóa (Hủy điểm danh)
// 3. Hàm Xóa (Hủy điểm danh) & TỰ ĐỘNG THU HỒI THÔNG BÁO
async function deleteAttendance(docId, studentName, notificationId) {
    if(confirm(`Hủy bỏ trạng thái nghỉ học của học sinh: ${studentName}?`)) {
        try {
            // Xóa bản ghi điểm danh
            await db.collection('yt_attendance').doc(docId).delete();
            
            // Nếu có ID thông báo đi kèm, tiến hành xóa luôn thông báo đó
            if (notificationId && notificationId !== 'null') {
                await db.collection('yt_notifications').doc(notificationId).delete();
                console.log(`Đã thu hồi thông báo ${notificationId}`);
            }
            
            loadAttendanceList(); // Load lại danh sách ngay lập tức
        } catch (err) {
            alert("Lỗi khi xóa: " + err.message);
        }
    }
}
</script>
