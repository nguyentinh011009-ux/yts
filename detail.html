<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="apple-touch-icon" sizes="180x180" href="https://res.cloudinary.com/dsnlbzjby/image/upload/q_auto/f_auto/v1775563762/Gemini_Generated_Image_1l7lw31l7lw31l7l_owwg7q.png">
    <link rel="icon" href="https://res.cloudinary.com/dsnlbzjby/image/upload/q_auto/f_auto/v1775563762/Gemini_Generated_Image_1l7lw31l7lw31l7l_owwg7q.png" sizes="32x32" type="image/png">
    <style>
        body { background: #f1f5f9; padding: 20px; }
        .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 200px); }
        .chat-messages { flex: 1; overflow-y: auto; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 15px; }
        .msg-admin { align-self: flex-end; background: #e0e7ff; color: #1e293b; border-radius: 15px 15px 0 15px; }
        .msg-fusoftx { align-self: flex-start; background: #1e293b; color: white; border-radius: 15px 15px 15px 0; }
        .msg-student { align-self: flex-start; background: #e2e8f0; color: #1e293b; border-radius: 15px 15px 15px 0; }
        .msg-item { padding: 10px 15px; max-width: 80%; }
        .msg-sender { font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="security-loading" style="position:fixed; inset:0; background:white; z-index:9999; display:flex; align-items:center; justify-content:center;">
        <i class="fas fa-spinner fa-spin fa-2x"></i>
    </div>

    <div id="main-content" style="max-width: 900px; margin: 0 auto; display: none;">
        <!-- JS sẽ render nội dung vào đây -->
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="config.js"></script>
    <script>
        const ALLOWED_ADMIN_EMAILS = [
            "nguyentinh011009@gmail.com", "tomizy09icloud@gmail.com", 
            "nguyenthixuandongvts@gmail.com", "yte.thptvothisaubrvt@gmail.com", "nguyentinh52009@gmail.com"
        ];
        
        firebase.auth().onAuthStateChanged((user) => {
            if (user && ALLOWED_ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('security-loading').style.display = 'none';
                loadDetailContent();
            } else {
                alert("Bạn chưa đăng nhập Admin hoặc không có quyền!");
                window.location.href = "admin.html";
            }
        });

        async function loadDetailContent() {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type');
            const id = params.get('id');
            const main = document.getElementById('main-content');
            main.style.display = 'block';

            if (!type || !id) {
                main.innerHTML = '<h1>Lỗi: URL không hợp lệ</h1>'; return;
            }

            document.title = `Chi tiết - ${type.toUpperCase()}`;

            // Định tuyến dựa trên loại
            if (type === 'ticket') {
                renderTicketDetail(id);
            } else if (type === 'fusoftx_support') {
                renderFusoftxSupportDetail(id);
            } else {
                main.innerHTML = '<h1>Lỗi: Loại nội dung không xác định</h1>';
            }
        }

        // 1. RENDER CHI TIẾT TICKET HỌC SINH
        function renderTicketDetail(ticketId) {
            const main = document.getElementById('main-content');
            
            db.collection('yt_tickets').doc(ticketId).onSnapshot(doc => {
                if(!doc.exists) { main.innerHTML = '<h1>Ticket không tồn tại</h1>'; return; }
                const t = doc.data();

                main.innerHTML = `
                    <div class="detail-header">
                        <div>
                            <h2 style="margin:0; color:#1e293b;"><i class="fas fa-headset"></i> Yêu cầu từ ${t.name} (${t.class})</h2>
                            <span style="font-size:0.85rem; color:#64748b;">Mã: ${t.ticketId}</span>
                        </div>
                        <a href="admin.html" class="btn" style="background:#e2e8f0; color:#475569;"><i class="fas fa-arrow-left"></i> Quay lại</a>
                    </div>
                    
                    <div class="form-card">
                        <div class="chat-container">
                            <div id="chat-messages" class="chat-messages">
                                <div class="msg-item msg-student">
                                    <div class="msg-sender">${t.name} (Học sinh)</div>
                                    ${t.content}
                                </div>
                                ${t.adminReply ? `<div class="msg-item msg-admin"><div class="msg-sender">Phòng Y Tế</div>${t.adminReply}</div>` : ''}
                            </div>
                            
                            ${t.status !== 'resolved' ? `
                                <div style="margin-top:20px;">
                                    <textarea id="reply-input" rows="3" placeholder="Nhập câu trả lời..." class="input-group" style="width:100%;"></textarea>
                                    <div style="display:flex; gap:10px; margin-top:10px;">
                                        <button onclick="updateTicketStatus('${ticketId}', 'processing')" class="btn" style="background:#eff6ff; color:#3b82f6;">Lưu & Đang xử lý</button>
                                        <button onclick="updateTicketStatus('${ticketId}', 'resolved')" class="btn btn-success">Trả lời & Đóng</button>
                                    </div>
                                </div>
                            ` : `<div style="text-align:center; margin-top:20px; color:#10b981; font-weight:bold;"><i class="fas fa-lock"></i> Yêu cầu này đã được đóng.</div>`}
                        </div>
                    </div>
                `;
            });
        }
        
        async function updateTicketStatus(docId, newStatus) {
            const replyText = document.getElementById('reply-input').value.trim();
            if (newStatus === 'resolved' && !replyText) return alert("Vui lòng nhập nội dung trả lời trước khi đóng!");
            await db.collection('yt_tickets').doc(docId).update({ adminReply: replyText, status: newStatus });
        }

        // 2. RENDER CHI TIẾT CHAT HỖ TRỢ FUSOFTX
        function renderFusoftxSupportDetail(ticketId) {
            const main = document.getElementById('main-content');
            
            db.collection('yt_admin_support').doc(ticketId).onSnapshot(doc => {
                if(!doc.exists) { main.innerHTML = '<h1>Yêu cầu hỗ trợ không tồn tại</h1>'; return; }
                const t = doc.data();

                let chatHtml = '';
                if(t.messages) {
                    t.messages.forEach(m => {
                        const cls = m.sender === 'admin' ? 'msg-admin' : 'msg-fusoftx';
                        chatHtml += `<div class="msg-item ${cls}"><div class="msg-sender">${m.senderName}</div>${m.text}</div>`;
                    });
                }

                main.innerHTML = `
                    <div class="detail-header">
                        <h2 style="margin:0; color:#1e293b;"><i class="fas fa-headset"></i> Yêu cầu Hỗ trợ FUSoftX #${t.ticketId}</h2>
                        <a href="admin.html" class="btn" style="background:#e2e8f0; color:#475569;"><i class="fas fa-arrow-left"></i> Quay lại</a>
                    </div>
                    <div class="form-card">
                        <div class="chat-container">
                            <div class="chat-messages">${chatHtml}</div>
                            ${t.status !== 'resolved' ? `
                                <div style="margin-top:20px; display:flex; gap:10px;">
                                    <input type="text" id="reply-fusoftx-input" placeholder="Nhập tin nhắn..." class="input-group" style="flex:1; margin:0;">
                                    <button onclick="replyFusoftxFromDetail('${ticketId}')" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Gửi</button>
                                </div>
                            ` : `<div style="text-align:center; margin-top:20px; color:#ef4444; font-weight:bold;"><i class="fas fa-lock"></i> FUSoftX đã đóng yêu cầu này.</div>`}
                        </div>
                    </div>
                `;

                // Tự cuộn
                setTimeout(() => {
                    const messages = main.querySelector('.chat-messages');
                    if(messages) messages.scrollTop = messages.scrollHeight;
                }, 100);
            });
        }
        
        async function replyFusoftxFromDetail(ticketId) {
            const input = document.getElementById('reply-fusoftx-input');
            const txt = input.value.trim(); if(!txt) return;
            input.value = '';
            const msg = { sender: "admin", senderName: "Phòng Y Tế", text: txt, time: Date.now() };
            await db.collection('yt_admin_support').doc(ticketId).update({
                messages: firebase.firestore.FieldValue.arrayUnion(msg)
            });
        }
    </script>
</body>
</html>
