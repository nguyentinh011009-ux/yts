<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Máy quét Y Tế Số</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        input { width: 100%; max-width: 300px; padding: 15px; font-size: 2rem; text-align: center; border-radius: 10px; border: none; letter-spacing: 5px; font-weight: bold; margin-bottom: 20px; outline: none; }
        button { background: #3b82f6; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 10px; font-weight: bold; width: 100%; max-width: 300px; cursor: pointer; }
        button:active { background: #2563eb; }
        #reader { width: 100%; max-width: 500px; border-radius: 20px; overflow: hidden; display: none; }
        #scan-result { margin-top: 20px; background: #10b981; color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="container" id="connect-screen">
        <i class="fas fa-qrcode fa-4x" style="color: #3b82f6; margin-bottom: 20px;"></i>
        <h2>KẾT NỐI MÁY TÍNH</h2>
        <p style="color: #94a3b8; text-align: center; margin-bottom: 30px;">Nhập mã 6 số hiển thị trên màn hình máy tính Admin để liên kết thiết bị.</p>
        
        <input type="number" id="sync-code-input" placeholder="------">
        <button id="btn-connect" onclick="connectToPC()">Kết nối Camera</button>
    </div>

    <div class="container" id="camera-screen" style="display: none; justify-content: flex-start; padding-top: 50px;">
        <div style="display: flex; justify-content: space-between; width: 100%; max-width: 500px; margin-bottom: 20px;">
            <div style="font-weight: bold; color: #10b981;"><i class="fas fa-link"></i> Đã kết nối PC</div>
            <button onclick="disconnectScanner()" style="background: #ef4444; width: auto; padding: 5px 15px; font-size: 0.9rem;">Ngắt kết nối</button>
        </div>
        
        <div id="reader"></div>
        <div id="scan-result">Đã gửi dữ liệu!</div>
        <p style="color: #94a3b8; margin-top: 20px; text-align: center; font-size: 0.9rem;">Hướng camera vào mã QR hoặc Barcode trên điện thoại của học sinh để quét.</p>
    </div>

    <!-- Firebase & Scanner Lib -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <!-- THAY file config.js của bạn vào đây nếu cần, hoặc cấu hình Firebase thủ công -->
    <script src="assets/config.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script>
        let syncCode = "";
        let html5QrcodeScanner = null;

        async function connectToPC() {
            syncCode = document.getElementById('sync-code-input').value.trim();
            if(syncCode.length !== 6) return alert("Vui lòng nhập đúng 6 số!");

            const btn = document.getElementById('btn-connect');
            btn.innerHTML = "Đang kết nối..."; btn.disabled = true;

            try {
                // Báo cho PC biết điện thoại đã sẵn sàng
                await db.collection('yt_scanners').doc(syncCode).update({ status: 'connected' });
                
                document.getElementById('connect-screen').style.display = 'none';
                document.getElementById('camera-screen').style.display = 'flex';
                document.getElementById('reader').style.display = 'block';

                startCamera();
            } catch (err) {
                alert("Mã kết nối không hợp lệ hoặc đã hết hạn!");
                btn.innerHTML = "Kết nối Camera"; btn.disabled = false;
            }
        }

        function startCamera() {
            // Cấu hình máy quét cực nhạy
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, /* verbose= */ false);
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        let isCooldown = false; // Chống quét liên tục (spam)

        function onScanSuccess(decodedText, decodedResult) {
            if(isCooldown) return;
            
            // Phát âm thanh bíp
            const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
            audio.play().catch(e => console.log(e));

            // Bắn dữ liệu lên Firebase để PC nhận
            db.collection('yt_scanners').doc(syncCode).update({
                scannedData: decodedText
            });

            // Hiện thông báo
            const resBox = document.getElementById('scan-result');
            resBox.innerText = `Đã gửi: ${decodedText}`;
            resBox.style.display = 'block';

            // Cooldown 2 giây rồi mới cho quét tiếp
            isCooldown = true;
            setTimeout(() => {
                isCooldown = false;
                resBox.style.display = 'none';
            }, 2000);
        }

        function onScanFailure(error) { /* Bỏ qua lỗi ko tìm thấy mã để tránh console đầy rác */ }
// Hàm xử lý nút ngắt kết nối
        async function disconnectScanner() {
            const btn = document.querySelector('button[onclick="disconnectScanner()"]');
            btn.innerHTML = "Đang ngắt...";
            if (syncCode) {
                try {
                    await db.collection('yt_scanners').doc(syncCode).delete();
                } catch(e) {}
            }
            location.reload(); // Tải lại trang sau khi xóa xong
        }

        // Lắng nghe sự kiện người dùng vuốt thoát web trên điện thoại
        window.addEventListener('beforeunload', function (e) {
            if (syncCode) {
                db.collection('yt_scanners').doc(syncCode).delete();
            }
        });
    </script>
</body>
</html>
