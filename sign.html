<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ký xác nhận - Y tế VTS</title>
    <link rel="apple-touch-icon" sizes="180x180" href="https://res.cloudinary.com/dsnlbzjby/image/upload/q_auto/f_auto/v1775563762/Gemini_Generated_Image_1l7lw31l7lw31l7l_owwg7q.png">
    <link rel="icon" href="https://res.cloudinary.com/dsnlbzjby/image/upload/q_auto/f_auto/v1775563762/Gemini_Generated_Image_1l7lw31l7lw31l7l_owwg7q.png" sizes="32x32" type="image/png">
    <style>
        :root { --primary: #0062ff; --bg: #0f172a; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            min-height: 100vh;
            overflow-y: auto;
            display: flex; flex-direction: column;
        }

        .header-mini {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; color: rgba(255,255,255,0.7); font-size: 0.85rem;
        }

        .canvas-container {
    margin: auto 15px; /* Tự động căn giữa theo chiều dọc */
    background: white; 
    border-radius: 12px;
    position: relative; 
    cursor: crosshair;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    
    /* Thiết lập kích thước cố định cho màn hình dọc */
    height: 280px; 
    width: calc(100% - 30px);
    
    /* XÓA dòng flex: 1; ở đây */
}

        canvas { 
            display: block; 
            border-radius: 12px; 
            touch-action: none; 
            width: 100%; 
            height: 100%; 
        }

        .controls {
            display: flex; gap: 12px; padding: 10px 15px 20px 15px;
        }

        button {
            flex: 1; padding: 14px; border: none; border-radius: 8px;
            font-weight: bold; font-size: 1rem; cursor: pointer;
            transition: 0.2s;
        }
        .btn-clear { background: #334155; color: white; }
        .btn-clear:active { background: #475569; }
        .btn-send { background: var(--primary); color: white; }
        .btn-send:active { background: #0052cc; }
        
        #status-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 15px 30px;
            border-radius: 30px; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="header-mini">
        <span>Hệ thống Y tế số - THPT Võ Thị Sáu</span>
        <span id="token-display">Đang chờ lệnh...</span>
    </div>

    <div class="canvas-container" id="container">
        <canvas id="sig-canvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn-clear" onclick="clearCanvas()">Xóa làm lại</button>
        <button class="btn-send" onclick="sendSignature()">Gửi xác nhận</button>
    </div>

    <div id="status-msg"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="config.js"></script>

    <script>
        const canvas = document.getElementById("sig-canvas");
        const ctx = canvas.getContext("2d");
        const container = document.getElementById("container");
        let drawing = false;

        // Lấy Token từ URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if(token) document.getElementById('token-display').innerText = "Mã: " + token;

        // Thiết lập kích thước Canvas động
        function resize() {
            // Lấy chính xác kích thước của khung chứa
            const rect = container.getBoundingClientRect();
            
            // Gán kích thước thực tế cho canvas
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            setupCanvasStyle();
            drawGuides();
        }

        window.addEventListener('resize', resize);
        // Đợi 300ms để CSS render xong khung mới set kích thước giấy vẽ
        setTimeout(resize, 300);

        function setupCanvasStyle() {
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2.5; 
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
        }

        // Vẽ hướng dẫn (Khung thống nhất không chia đôi)
        function drawGuides() {
            ctx.save();
            ctx.font = "italic 16px sans-serif";
            ctx.fillStyle = "#94a3b8";
            ctx.textAlign = "center";
            // Căn giữa dòng chữ hướng dẫn ở phía trên cùng của khung ký
            ctx.fillText("", canvas.width / 2, 35);
            ctx.restore();
            setupCanvasStyle();
        }

        window.addEventListener('resize', resize);
        setTimeout(resize, 100);

       
        // Logic vẽ (Đã tối ưu để track chữ ký chính xác)
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            // Ưu tiên lấy tọa độ touch (mobile), nếu không có thì lấy tọa độ chuột (PC)
            const t = e.touches ? e.touches[0] : e;
            
            // Tính tỷ lệ giữa kích thước thật của canvas và kích thước hiển thị CSS
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            // Sử dụng clientX/clientY thay vì pageX/pageY để không bị lỗi khi cuộn trang
            return {
                x: (t.clientX - rect.left) * scaleX,
                y: (t.clientY - rect.top) * scaleY
            };
        }

        function startDrawing(e) {
            // Chặn hành vi cuộn trang/zoom trên mobile khi bắt đầu chạm vào vùng ký
            if (e.cancelable) {
                e.preventDefault(); 
            }
            drawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!drawing) return;
            if (e.cancelable) {
                e.preventDefault();
            }
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        canvas.addEventListener("mousedown", startDrawing);
        canvas.addEventListener("mousemove", draw);
        window.addEventListener("mouseup", () => drawing = false);
        window.addEventListener("mouseout", () => drawing = false); // Thêm dòng này để ngắt vẽ khi chuột ra khỏi màn hình
        
        canvas.addEventListener("touchstart", startDrawing, {passive: false});
        canvas.addEventListener("touchmove", draw, {passive: false});
        canvas.addEventListener("touchend", () => drawing = false);
        canvas.addEventListener("touchcancel", () => drawing = false);
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGuides();
        }

        async function sendSignature() {
            if (!token) { alert("Lỗi: Không tìm thấy Token xác thực!"); return; }
            
            const msg = document.getElementById('status-msg');
            msg.innerText = "Đang gửi dữ liệu...";
            msg.style.display = 'block';
            
            const dataUrl = canvas.toDataURL("image/png");
            
            try {
                await db.collection('temp_signatures').doc(token).set({
                    img: dataUrl,
                    status: 'done',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                document.body.innerHTML = `
                    <div style="color:white; text-align:center; padding-top:20vh;">
                        <div style="font-size:5rem; color:#10b981;">✓</div>
                        <h2>HOÀN TẤT XÁC NHẬN</h2>
                        <p>Dữ liệu của bạn đã được lưu vào hồ sơ y tế.</p>
                        <p style="opacity:0.5; font-size:0.8rem;">Bạn có thể đóng trình duyệt này.</p>
                    </div>`;
            } catch (error) {
                alert("Lỗi khi gửi: " + error.message);
                msg.style.display = 'none';
            }
        }
    </script>

</body>
</html>
